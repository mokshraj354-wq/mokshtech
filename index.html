<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>novetech</title>

<style>
:root{
--bg:#0b0c10;
--text:#ffffff;
--glass:rgba(255,255,255,0.08);
--grad:linear-gradient(90deg,#00f5ff,#7f00ff);
}
<a href="https://wa.me/9905408635" target="_blank" style="
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50%;
text-decoration:none;
font-size:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">

body.light{

--bg:#f5f5f7;
--text:#111;
--glass:rgba(0,0,0,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:0.4s;
scroll-behavior:smooth;
overflow-x:hidden;
}

/* Floating Navbar */
header{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:50px;
background:var(--glass);
backdrop-filter:blur(20px);
box-shadow:0 8px 30px rgba(0,0,0,0.4);
z-index:1000;
}
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="portfolio.html">Portfolio</a>
<a href="contact.html">Contact</a>
nav a{
margin:0 15px;
text-decoration:none;
color:var(--text);
font-weight:500;
}

.toggle{
padding:8px 15px;
border-radius:20px;
border:none;
cursor:pointer;
background:var(--grad);
color:white;
font-weight:bold;
}

/* Hero */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:120px 10%;
}

.hero h1{
font-size:70px;
background:var(--grad);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-size:200%;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.8;
max-width:600px;
}

.btn{
margin-top:30px;
padding:14px 30px;
border-radius:40px;
border:none;
cursor:pointer;
font-weight:bold;
background:var(--grad);
color:white;
}

/* 3D Floating Shapes */
.float{
position:absolute;
width:140px;
height:140px;
border-radius:30px;
background:var(--glass);
backdrop-filter:blur(15px);
animation:float 6s ease-in-out infinite;
}

.f1{top:15%;left:8%;}
.f2{bottom:15%;right:10%;animation-delay:2s;}

@keyframes float{
0%,100%{transform:translateY(0) rotate(0);}
50%{transform:translateY(-30px) rotate(12deg);}
}

/* Contact */
form{
margin-top:40px;
display:flex;
flex-direction:column;
gap:15px;
width:320px;
}

input, textarea{
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

footer{
padding:30px;
text-align:center;
background:rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
<h2>novatech</h2>
<nav>
<a href="#contact">Contact</a>
<button class="toggle" onclick="toggleMode()">Toggle</button>
</nav>
</header>

<div class="float f1"></div>
<div class="float f2"></div>

<section class="hero">
<h1>Engineering the Extraordinary.</h1>
<p>Luxury-grade digital systems designed with precision, innovation, and global scale performance.</p>
<button class="btn" onclick="document.getElementById('contact').scrollIntoView()">Work With Us</button>
</section>

<section id="contact">
<h2>Contact Us</h2>

<form action="https://formsubmit.co/mokshraj354@gmail.com" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" rows="4" placeholder="Your Message" required></textarea>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://example.com/thankyou.html">

<button class="btn" type="submit">Send Message</button>
</form>
</section>

<footer>
© 2026 NovaTech | Designed for Innovation
</footer>

<script>
function toggleMode(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
